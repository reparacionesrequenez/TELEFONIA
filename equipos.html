<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
  <div class="container mt-4">
    <h2 class="text-center mb-4">Registro de Equipos</h2>

    <form id="formEquipo" class="row g-3">
      <input type="hidden" id="equipoId">

      <div class="col-md-4">
        <input type="text" id="cliente" class="form-control" placeholder="Cliente" required>
      </div>
      <div class="col-md-4">
        <input type="text" id="telefono" class="form-control" placeholder="Teléfono" required>
      </div>
      <div class="col-md-4">
        <input type="text" id="equipo" class="form-control" placeholder="Equipo" required>
      </div>
      <div class="col-md-4">
        <input type="text" id="marca" class="form-control" placeholder="Marca" required>
      </div>
      <div class="col-md-4">
        <input type="text" id="modelo" class="form-control" placeholder="Modelo" required>
      </div>
      <div class="col-md-4">
        <input type="text" id="falla" class="form-control" placeholder="Falla" required>
      </div>
      <div class="col-md-4">
        <input type="text" id="estado" class="form-control" placeholder="Estado" required>
      </div>
      <div class="col-md-4">
        <input type="number" id="precio" class="form-control" placeholder="Precio" required>
      </div>
      <div class="col-md-4">
        <input type="date" id="fecha" class="form-control" required>
      </div>

      <div class="col-12">
        <button type="submit" class="btn btn-success">Guardar</button>
        <button type="button" class="btn btn-warning" id="btnCancelar">Cancelar edición</button>
        <a href="index.html" class="btn btn-light">Inicio</a>
      </div>
    </form>

    <hr class="my-4">

    <div class="table-responsive">
      <table class="table table-dark table-bordered table-striped">
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Teléfono</th>
            <th>Equipo</th>
            <th>Marca</th>
            <th>Modelo</th>
            <th>Falla</th>
            <th>Estado</th>
            <th>Precio</th>
            <th>Fecha</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaEquipos"></tbody>
      </table>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
