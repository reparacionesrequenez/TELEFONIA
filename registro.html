<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card bg-secondary text-white p-4">
          <h3 class="text-center mb-3">Crear cuenta</h3>

          <form id="formRegistro">
            <input type="text" id="nombreRegistro" class="form-control mb-3" placeholder="Nombre completo" required>
            <input type="email" id="correoRegistro" class="form-control mb-3" placeholder="Correo" required>
            <input type="password" id="passwordRegistro" class="form-control mb-3" placeholder="Contraseña" required>
            <button type="submit" class="btn btn-success w-100">Registrarme</button>
          </form>

          <a href="login.html" class="btn btn-light mt-3">Ya tengo cuenta</a>
          <a href="index.html" class="btn btn-outline-light mt-2">Volver al inicio</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
