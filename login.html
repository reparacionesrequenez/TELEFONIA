<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card bg-secondary text-white p-4">
          <h3 class="text-center">Iniciar Sesión</h3>
          <form id="formLogin">
            <input type="email" id="correo" class="form-control mb-3" placeholder="Correo" required>
            <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña" required>
            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
          </form>
          <a href="index.html" class="btn btn-light mt-3">Volver</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
